org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.daemon=true

# JDK 스위칭 가이드(옵션)
# - 프로젝트는 sourceCompatibility=17 기준입니다.
# - 권장: 환경별 JDK 경로는 JAVA_HOME_17 환경변수로 관리하고, gradlew 실행 전에 JAVA_HOME으로 전달하세요.
#   PowerShell 예시: $env:JAVA_HOME = if($env:JAVA_HOME_17){$env:JAVA_HOME_17}else{$env:JAVA_HOME}
# - 고정값이 필요한 경우 아래 주석을 해제하고 실제 JDK 17 경로를 넣으세요.
#   org.gradle.java.home=<JDK17_절대_경로>
